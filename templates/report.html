{% extends "base.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
    /* Premium Markdown Styling (Vercel/Shadcn inspired) */
    .premium-prose { color: #d4d4d8; font-size: 0.95rem; line-height: 1.7; }
    .premium-prose h1 { color: #ffffff; font-size: 1.875rem; font-weight: 600; letter-spacing: -0.025em; margin-top: 2rem; margin-bottom: 1rem; }
    .premium-prose h2 { color: #f4f4f5; font-size: 1.25rem; font-weight: 600; letter-spacing: -0.025em; margin-top: 2rem; margin-bottom: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
    .premium-prose h3 { color: #e4e4e7; font-size: 1.1rem; font-weight: 500; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .premium-prose p { margin-bottom: 1.25rem; }
    .premium-prose strong { color: #ffffff; font-weight: 600; }
    .premium-prose ul { list-style-type: none; padding-left: 0; margin-bottom: 1.25rem; }
    .premium-prose ul li { position: relative; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .premium-prose ul li::before { content: "•"; position: absolute; left: 0.5rem; color: #52525b; font-weight: bold; }
    .premium-prose blockquote { border-left: 2px solid #3f3f46; padding-left: 1rem; color: #a1a1aa; font-style: italic; margin-bottom: 1.25rem; }
    .premium-prose code { background-color: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.2em 0.4em; border-radius: 0.25rem; font-family: monospace; font-size: 0.85em; color: #e4e4e7; }
    
    /* --- AI ALERT BOX OVERRIDES (DARK MODE GLASSMORPHISM) --- */
    
    /* Overriding the AI's hardcoded Red/Critical boxes */
    .premium-prose div[style*="#ffebee"], 
    .premium-prose div[style*="ffebee"] {
        background-color: rgba(239, 68, 68, 0.1) !important;
        border: 1px solid rgba(239, 68, 68, 0.2) !important;
        border-left: 3px solid #ef4444 !important;
        color: #fca5a5 !important;
        border-radius: 0.5rem !important;
        padding: 1rem 1.25rem !important;
        margin: 1.5rem 0 !important;
        line-height: 1.6 !important;
    }
    .premium-prose div[style*="#ffebee"] strong, 
    .premium-prose div[style*="ffebee"] strong {
        color: #f87171 !important;
        font-weight: 600 !important;
    }

    /* Overriding the AI's hardcoded Yellow/Warning boxes */
    .premium-prose div[style*="#fffde7"], 
    .premium-prose div[style*="fffde7"],
    .premium-prose div[style*="#ffeb3b"] {
        background-color: rgba(245, 158, 11, 0.1) !important;
        border: 1px solid rgba(245, 158, 11, 0.2) !important;
        border-left: 3px solid #f59e0b !important;
        color: #fcd34d !important;
        border-radius: 0.5rem !important;
        padding: 1rem 1.25rem !important;
        margin: 1.5rem 0 !important;
        line-height: 1.6 !important;
    }
    .premium-prose div[style*="#fffde7"] strong, 
    .premium-prose div[style*="fffde7"] strong {
        color: #fbbf24 !important;
        font-weight: 600 !important;
    }

    /* Print Styles for flawless PDF generation */
    @media print {
        body { background: white !important; color: black !important; }
        .no-print { display: none !important; }
        .print-canvas { 
            background: white !important; 
            border: none !important; 
            box-shadow: none !important; 
            max-width: 100% !important; 
            padding: 0 !important;
            color: black !important;
        }
        .premium-prose { color: #333 !important; }
        .premium-prose h1, .premium-prose h2, .premium-prose h3, .premium-prose strong { color: #000 !important; border-color: #eee !important; }
        .premium-prose code { background-color: #f4f4f5 !important; color: #ef4444 !important; border-color: #e4e4e7 !important; }
        .premium-prose ul li::before { color: #a1a1aa !important; }
        
        /* Revert Alerts to Light Mode for PDF printing */
        .premium-prose div[style*="#ffebee"], .premium-prose div[style*="ffebee"] {
            background-color: #fef2f2 !important;
            border: 1px solid #fee2e2 !important;
            border-left: 4px solid #ef4444 !important;
            color: #991b1b !important;
        }
        .premium-prose div[style*="#fffde7"], .premium-prose div[style*="fffde7"] {
            background-color: #fffbeb !important;
            border: 1px solid #fef3c7 !important;
            border-left: 4px solid #f59e0b !important;
            color: #92400e !important;
        }
    }
</style>

<div class="max-w-3xl mx-auto mb-6 flex justify-between items-center no-print relative z-20">
    <a href="/leader/dashboard" class="flex items-center gap-2 text-sm font-medium text-zinc-400 hover:text-zinc-100 transition-colors group">
        <svg class="w-4 h-4 text-zinc-500 group-hover:text-zinc-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Dashboard
    </a>
    
    <button onclick="window.print()" class="flex items-center gap-2 bg-zinc-100 text-black hover:bg-zinc-300 font-medium rounded-md px-4 py-2 transition-all text-sm shadow-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
        Export PDF
    </button>
</div>

<div class="max-w-3xl mx-auto relative z-10">
    <div class="absolute w-[600px] h-[600px] bg-zinc-700/5 rounded-full blur-[100px] pointer-events-none top-1/4 left-1/2 -translate-x-1/2 no-print"></div>

    <div class="print-canvas bg-[#0a0a0a]/90 backdrop-blur-2xl border border-zinc-800/80 rounded-xl p-8 md:p-12 shadow-2xl relative z-10">
        
        <div class="border-b border-zinc-800/60 pb-8 mb-8">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-zinc-200 to-zinc-500 flex items-center justify-center text-black shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                            <path fill-rule="evenodd" d="M14.615 1.595a.75.75 0 01.359.852L12.982 9.75h7.268a.75.75 0 01.548 1.262l-10.5 11.25a.75.75 0 01-1.272-.71l1.992-7.302H3.75a.75.75 0 01-.548-1.262l10.5-11.25a.75.75 0 01.913-.143z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-zinc-100 leading-none">Pulse Executive Summary</h1>
                        <p class="text-xs text-zinc-500 mt-1 uppercase tracking-widest">Auto-Generated by Gemini AI</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-sm font-medium text-zinc-300">Team {{ report.team_id }}</p>
                    <p class="text-xs text-zinc-500 font-mono mt-0.5" id="current-date"></p>
                </div>
            </div>
        </div>

        <textarea id="raw-markdown" class="hidden">{{ report.summary }}</textarea>
        
        <div id="rendered-content" class="premium-prose">
            <div class="animate-pulse flex space-x-4 no-print">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-zinc-800 rounded w-3/4"></div>
                    <div class="space-y-2">
                        <div class="h-4 bg-zinc-800 rounded"></div>
                        <div class="h-4 bg-zinc-800 rounded w-5/6"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 pt-6 border-t border-zinc-800/60 flex justify-between items-center no-print">
            <span class="text-[10px] text-zinc-600 font-mono tracking-widest uppercase">End of Report • ID: {{ report.id }}</span>
            <span class="text-[10px] text-zinc-600 font-mono">CONFIDENTIAL</span>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', dateOptions);

        const rawMd = document.getElementById("raw-markdown").value;
        const targetDiv = document.getElementById("rendered-content");
        
        if(rawMd && rawMd.trim() !== "") {
            targetDiv.innerHTML = marked.parse(rawMd);
        } else {
            targetDiv.innerHTML = "<p class='text-zinc-500 italic'>No data available for this report.</p>";
        }
    });
</script>
{% endblock %}
